<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Learning Math</title>
  </head>
  <body
    class="bg-gray-950 font-[inter] min-h-screen flex items-center justify-center"

    >
      <h1 class="text-white text-2xl font-bold">Welcome</h1>
      <h1 class="text-gray-300 text-lg">
        This page is focused on practical math learning, through pattern

      </h1>
      <h2 class="text-gray-400 text-base">

      <p

      >
        that is, if you do it everyday tho
      </p>
      <button
        id="btnStart"
        class="py-2 px-5 text-2xl font-bold text-white bg-green-700 border border-green-600 rounded-lg transition duration-300 hover:bg-green-500 hover:cursor-pointer"
      >
        START
      </button>
    </div>
    <p class="absolute bottom-0 left-0 text-[10px] text-gray-600">
      v0.0.1 please note that i know this is dumb design, but I wanted to
