<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Let's go!</title>
  </head>
  <body class="flex items-center justify-center min-h-screen bg-blue-200">
    <div id="quiz" class="bg-gray-300 p-8 rounded-xl shadow-2xl text-center">
      <p id="question" class="text-4xl font-bold mb-4"></p>
      <input
        type="number"
        id="answer"
        class="border rounded p-2 w-full mb-4"
        placeholder=""
      />
      <button
        id="submit"
        class="bg-green-600 text-red-800 px-6 py-4 rounded hover:bg-green-800"
      >
        Submit
      </button>
    </div>

    <script src="src/dist/game.js" type="module" defer></script>
    <script src="src/dist/game-main.js" type="module" defer></script>
  </body>
</html>
